<!DOCTYPE html>
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gracias por tu mensaje</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-gray-100 min-h-screen">
    <!-- Navbar -->
    <header>
      <nav
        aria-label="Barra de navegación"
        class="bg-gray-900 text-white fixed top-0 w-full shadow z-50"
      >
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div class="flex items-center justify-between h-16">
            <a href="#page-top" class="text-xl font-bold">Paladar Negro</a>

            <!-- Menú escritorio -->
            <div class="hidden md:flex space-x-4">
              <a href="#home" class="hover:text-yellow-400">Inicio</a>
              <a href="#products" class="hover:text-yellow-400">Productos</a>
              <a href="#contact" class="hover:text-yellow-400">Contacto</a>
            </div>

            <!-- Botón menú móvil -->
            <div class="md:hidden">
              <button
                id="menu-btn"
                aria-expanded="false"
                aria-controls="mobile-menu"
                aria-label="Abrir menú de navegación"
                class="text-white focus:outline-none"
              >
                <i data-lucide="menu"></i>
              </button>
            </div>
          </div>

          <!-- Menú móvil -->
          <div id="nav-links" class="hidden md:hidden mt-2 space-y-2">
            <a href="#home" class="block hover:text-yellow-400">Inicio</a>
            <a href="#products" class="block hover:text-yellow-400"
              >Productos</a
            >
            <a href="#contact" class="block hover:text-yellow-400">Contacto</a>
          </div>
        </div>
      </nav>
    </header>

    <!-- Contenido principal -->
    <main class="flex items-center justify-center min-h-screen px-4 pt-24">
      <div
        class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full text-center"
      >
        <i
          data-lucide="mail-check"
          class="w-12 h-12 text-green-600 mx-auto mb-4"
        ></i>
        <h1 class="text-3xl font-semibold text-green-600 mb-2">
          ¡Gracias por tu mensaje!
        </h1>
        <p class="text-gray-700 mb-6">Te responderemos lo antes posible.</p>
        <a
          href="/"
          class="inline-block px-6 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 transition"
        >
          Volver al inicio
        </a>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8">
      <div
        class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center text-center md:text-left space-y-4 md:space-y-0"
      >
        <!-- Logo -->
        <div>
          <h2 class="text-2xl font-bold">Paladar Negro</h2>
          <p class="text-sm text-gray-400">
            © <span id="year"></span> Paladar Negro. Todos los derechos
            reservados.
          </p>
        </div>

        <!-- Enlaces -->
        <div class="space-x-4">
          <a href="#home" class="hover:underline text-gray-300">Inicio</a>
          <a href="#products" class="hover:underline text-gray-300"
            >Productos</a
          >
          <a href="#contact" class="hover:underline text-gray-300">Contacto</a>
        </div>

        <!-- Redes -->
        <div class="flex space-x-4">
          <a
            href="https://www.instagram.com/paladar_negro_gourmet/"
            target="_blank"
            class="hover:text-pink-400 transition"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6 fill-current text-white"
              viewBox="0 0 24 24"
            >
              <path
                d="M12 2.2c3.2 0 3.6 0 4.8.1 1.1.1 1.7.2 2.1.4.5.2.8.4 1.1.8.3.3.5.7.8 1.1.2.4.3 1 .4 2.1.1 1.2.1 1.6.1 4.8s0 3.6-.1 4.8c-.1 1.1-.2 1.7-.4 2.1-.2.5-.4.8-.8 1.1-.3.3-.7.5-1.1.8-.4.2-1 .3-2.1.4-1.2.1-1.6.1-4.8.1s-3.6 0-4.8-.1c-1.1-.1-1.7-.2-2.1-.4-.5-.2-.8-.4-1.1-.8-.3-.3-.5-.7-.8-1.1-.2-.4-.3-1-.4-2.1C2.2 15.6 2.2 15.2 2.2 12s0-3.6.1-4.8c.1-1.1.2-1.7.4-2.1.2-.5.4-.8.8-1.1.3-.3.7-.5 1.1-.8.4-.2 1-.3 2.1-.4C8.4 2.2 8.8 2.2 12 2.2zm0-2.2C8.7 0 8.3 0 7.1.1 5.9.2 5 .4 4.2.8 3.4 1.2 2.7 1.8 2 2.5.8 3.7.2 5.6.1 7.1 0 8.3 0 8.7 0 12s0 3.7.1 4.9c.1 1.5.7 3.4 1.9 4.6s3.1 1.8 4.6 1.9c1.2.1 1.6.1 4.9.1s3.7 0 4.9-.1c1.5-.1 3.4-.7 4.6-1.9s1.8-3.1 1.9-4.6c.1-1.2.1-1.6.1-4.9s0-3.7-.1-4.9c-.1-1.5-.7-3.4-1.9-4.6S18.4.2 16.9.1C15.7 0 15.3 0 12 0zm0 5.8a6.2 6.2 0 100 12.4 6.2 6.2 0 000-12.4zm0 10.3a4.1 4.1 0 110-8.2 4.1 4.1 0 010 8.2zm6.4-11.5a1.4 1.4 0 100 2.8 1.4 1.4 0 000-2.8z"
              />
            </svg>
          </a>
        </div>
      </div>
    </footer>

    <script>
      lucide.createIcons();
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
