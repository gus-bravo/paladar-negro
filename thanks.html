<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Gracias por tu mensaje</title>

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body class="bg-gray-100 min-h-screen">
    <header></header>

    <!-- Contenido principal -->
    <main class="flex items-center justify-center min-h-screen px-4 pt-24">
      <div
        class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full text-center"
      >
        <i
          data-lucide="mail-check"
          class="w-12 h-12 text-green-600 mx-auto mb-4"
        ></i>
        <h1 class="text-3xl font-semibold text-green-600 mb-2">
          ¡Gracias por tu mensaje!
        </h1>
        <p class="text-gray-700 mb-6">Te responderemos lo antes posible.</p>
        <a
          href="/"
          class="inline-block px-6 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 transition"
        >
          Volver al inicio
        </a>
      </div>
    </main>
    <footer></footer>

    <!-- Navbar y Footer -->
    <script src="./assets/js/navbar.js"></script>
    <script src="./assets/js/footer.js"></script>

    <script>
      // Renderiza los iconos Lucide
      lucide.createIcons();

      // Año automático en el footer
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
