<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="./assets/css/style.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Paladar Negro</title>
</head>
<body>
  <nav class="bg-gray-900 text-white fixed top-0 w-full shadow z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <a href="#page-top" class="text-xl font-bold">Paladar Negro</a>
      <div class="hidden md:flex space-x-4">
        <a href="#home" class="hover:text-yellow-400">Inicio</a>
        <a href="#products" class="hover:text-yellow-400">Productos</a>
        <a href="#contact" class="hover:text-yellow-400">Contacto</a>
      </div>
      <!-- Botón para móviles -->
      <div class="md:hidden">
        <button id="menu-btn" class="text-white focus:outline-none">
          ☰
        </button>
      </div>
    </div>
    <!-- Menú desplegable móvil -->
    <div id="mobile-menu" class="hidden md:hidden mt-2 space-y-2">
      <a href="#home" class="block hover:text-yellow-400">Inicio</a>
      <a href="#products" class="block hover:text-yellow-400">Productos</a>
      <a href="#contact" class="block hover:text-yellow-400">Contacto</a>
    </div>
  </div>
</nav>
<header id="home" class="text-center bg-gray-900 text-white py-16 px-4">
  <img src="./assets/img/paladar-logo.png" alt="Logo Paladar Negro" class="mx-auto w-40 h-40 mb-6 rounded-full shadow-lg" />
  <h1 class="text-5xl font-bold mb-4">Paladar Negro</h1>
  <p class="text-xl mb-2">Comidas, fiambres, vinos y mucho más!</p>

  <hr class="w-32 border-t-2 border-white mx-auto my-6" />

  <p class="text-lg mb-4">¡Delivery sin cargo! 📞 4822-6446</p>

  <a href="https://www.instagram.com/paladar_negro_gourmet/" target="_blank"
     class="inline-block bg-pink-600 hover:bg-pink-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-300">
    Seguinos en Instagram
  </a>
</header>
<section id="products" class="py-12 bg-gray-100 scroll-mt-24">
  <div class="max-w-6xl mx-auto px-4">
    <h2 class="text-3xl font-bold mb-8 text-center">Nuestras picadas</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
      <div class="overflow-hidden rounded-lg shadow transition transform hover:scale-105 hover:shadow-xl duration-300">
        <img src="./assets/img/paladar-picada1.jpg" alt="Picada 1" class="w-full h-64 object-cover">
      </div>
      <div class="overflow-hidden rounded-lg shadow transition transform hover:scale-105 hover:shadow-xl duration-300">
        <img src="./assets/img/paladar-picada2.jpg" alt="Picada 2" class="w-full h-64 object-cover">
      </div>
      <div class="overflow-hidden rounded-lg shadow transition transform hover:scale-105 hover:shadow-xl duration-300">
        <img src="./assets/img/paladar-picada3.jpg" alt="Picada 3" class="w-full h-64 object-cover">
      </div>
      <div class="overflow-hidden rounded-lg shadow transition transform hover:scale-105 hover:shadow-xl duration-300">
        <img src="./assets/img/paladar-picada4.jpg" alt="Picada 4" class="w-full h-64 object-cover">
      </div>
      <div class="overflow-hidden rounded-lg shadow transition transform hover:scale-105 hover:shadow-xl duration-300">
        <img src="./assets/img/paladar-picada5.jpg" alt="Picada 5" class="w-full h-64 object-cover">
      </div>
      <div class="overflow-hidden rounded-lg shadow transition transform hover:scale-105 hover:shadow-xl duration-300">
        <img src="./assets/img/paladar-picada6.jpg" alt="Picada 6" class="w-full h-64 object-cover">
      </div>
    </div>
  </div>
</section>
<section id="contact" class="max-w-6xl mx-auto my-12 px-4">
  <div class="flex flex-col md:flex-row md:space-x-8 items-start">
    <!-- Formulario -->
    <form class="md:w-1/2 bg-white p-6 rounded-lg shadow-lg">
      <h3 class="text-3xl mb-6 font-semibold text-center">¡Contactanos!</h3>
      <div class="mb-4">
        <label for="nombre" class="block mb-1 font-medium">Nombre</label>
        <input type="text" id="nombre" name="nombre" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>
      <div class="mb-4">
        <label for="email" class="block mb-1 font-medium">Email</label>
        <input type="email" id="email" name="email" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>
      <div class="mb-4">
        <label for="mensaje" class="block mb-1 font-medium">Mensaje</label>
        <textarea id="mensaje" name="mensaje" rows="4" required
                  class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
      </div>
      <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700 transition">Enviar</button>
    </form>
    <!-- Mapa -->
    <div class="md:w-1/2 mt-8 md:mt-0 p-6 rounded-lg overflow-hidden shadow-lg h-96 max-w-md flex flex-col items-center">
      <h3 class="text-3xl mb-6 font-semibold text-center">¡Vení a nuestro local!</h3>
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3280.839669845565!2d-58.39271928478293!3d-34.5910537804571!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95bccab69c1a06f3%3A0x6b1a1b1d0e2d4edb!2sAv.%20Santa%20Fe%202180%2C%20C1425%20CABA!5e0!3m2!1ses!2sar!4v1686823386699!5m2!1ses!2sar"
        width="100%"
        height="100%"
        style="border:0;"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </div>
  </div>
</section>
<script>
  // Script simple para mostrar/ocultar menú móvil
  const menuBtn = document.getElementById('menu-btn');
  const mobileMenu = document.getElementById('mobile-menu');
  menuBtn.addEventListener('click', () => {
    mobileMenu.classList.toggle('hidden');
  });
</script>
</body>
</html>
