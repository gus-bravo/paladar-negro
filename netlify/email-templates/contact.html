<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- Estilos internos para el diseño del email -->
    <style>
      /* Estilo general del cuerpo */
      body {
        font-family: sans-serif;
        background-color: #f3f4f6; /* gris clarito */
        margin: 0;
        padding: 20px;
        color: #1f2937; /* gris oscuro */
      }

      /* Contenedor principal centrado */
      .container {
        background-color: white;
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); /* sombra sutil */
      }

      /* Estilo para el logo */
      .logo {
        display: block;
        margin: 0 auto 20px;
        max-height: 60px;
      }

      /* Título principal */
      h1 {
        text-align: center;
        color: #4f46e5; /* violeta */
        font-size: 24px;
      }

      /* Cada campo de información */
      .field {
        margin-bottom: 16px;
      }

      /* Etiqueta del campo (por ejemplo: Nombre, Email, etc.) */
      .field label {
        font-weight: bold;
        display: block;
        margin-bottom: 4px;
      }

      /* Contenedor del valor ingresado por el usuario */
      .field span {
        display: block;
        background-color: #f9fafb; /* fondo muy claro */
        padding: 8px;
        border-radius: 4px;
        border: 1px solid #e5e7eb; /* borde suave */
      }

      /* Pie de página del mensaje */
      .footer {
        text-align: center;
        margin-top: 20px;
        font-size: 12px;
        color: #9ca3af; /* gris más claro */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Logo de Paladar Negro -->
      <img
        src="https://paladar-negro-web.netlify.app/assets/img/paladar-logo.png"
        alt="Paladar Negro"
        class="logo"
      />

      <!-- Título del mensaje -->
      <h1>Nuevo mensaje desde el formulario</h1>

      <!-- Campo: Nombre del remitente -->
      <div class="field">
        <label>Nombre</label>
        <span>{{ name }}</span>
        <!-- Variable que será reemplazada por Netlify -->
      </div>

      <!-- Campo: Email del remitente -->
      <div class="field">
        <label>Email</label>
        <span>{{ email }}</span>
      </div>

      <!-- Campo: Mensaje escrito por el usuario -->
      <div class="field">
        <label>Mensaje</label>
        <span>{{ message }}</span>
      </div>

      <!-- Pie de página explicativo -->
      <div class="footer">
        Este mensaje fue enviado desde el formulario de contacto de Paladar
        Negro.
      </div>
    </div>
  </body>
</html>
