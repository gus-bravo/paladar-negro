<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: sans-serif;
        background-color: #f3f4f6;
        margin: 0;
        padding: 20px;
        color: #1f2937;
      }
      .container {
        background-color: white;
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      .logo {
        display: block;
        margin: 0 auto 20px;
        max-height: 60px;
      }
      h1 {
        text-align: center;
        color: #4f46e5;
        font-size: 24px;
      }
      .field {
        margin-bottom: 16px;
      }
      .field label {
        font-weight: bold;
        display: block;
        margin-bottom: 4px;
      }
      .field span {
        display: block;
        background-color: #f9fafb;
        padding: 8px;
        border-radius: 4px;
        border: 1px solid #e5e7eb;
      }
      .footer {
        text-align: center;
        margin-top: 20px;
        font-size: 12px;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src=https://paladar-negro-web.netlify.app/assets/img/paladar-logo.png
      alt="Paladar Negro" class="logo" />

      <h1>Nuevo mensaje desde el formulario</h1>

      <div class="field">
        <label>Nombre</label>
        <span>{{ nombre }}</span>
      </div>

      <div class="field">
        <label>Email</label>
        <span>{{ email }}</span>
      </div>

      <div class="field">
        <label>Mensaje</label>
        <span>{{ mensaje }}</span>
      </div>

      <div class="footer">
        Este mensaje fue enviado desde el formulario de contacto de Paladar
        Negro.
      </div>
    </div>
  </body>
</html>
